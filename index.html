<!-- 쿠키 패닉 (프로토 1호) — 텔레그래프 퍼즐: 모든 위협이 예고되는 귀여운 배치 퍼즐. 오리지널 캐릭터(외부 IP 미사용). core.js(로직)+ui.js(렌더/입력) 로드. -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>지켜줘! 젤리 패닉</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    font-family:'Jua','BM Jua','Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif; /* 외부 폰트 의존 0 */
    background: linear-gradient(160deg, #FFF3DC 0%, #FFE3EE 55%, #E8F6FF 100%);
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; min-height:100dvh; overflow:hidden; touch-action:none; user-select:none; -webkit-user-select:none;
  }
  #wrap { width:min(440px, 100vw); padding:10px 12px calc(12px + env(safe-area-inset-bottom, 4px)); display:flex; flex-direction:column; align-items:center; gap:8px; }

  /* ── 헤더: 마스코트 + 점수 + 벨 ── */
  #header { width:100%; display:flex; align-items:center; gap:10px; }
  #mascot { width:74px; height:74px; flex:0 0 auto; filter:drop-shadow(0 3px 0 rgba(140,90,40,.25)); }
  #mascot .face-worried, #mascot .face-cheer, #mascot .face-ko { display:none; }
  #mascot.worried .face-idle { display:none; } #mascot.worried .face-worried { display:block; }
  #mascot.cheer  .face-idle { display:none; } #mascot.cheer  .face-cheer  { display:block; }
  #mascot.ko     .face-idle { display:none; } #mascot.ko     .face-ko     { display:block; }
  #mascot.worried { animation: tremble .18s infinite; }
  #mascot.cheer   { animation: hop .5s ease; }
  @keyframes tremble { 0%{transform:translateX(0) rotate(-2deg)} 50%{transform:translateX(1.5px) rotate(2deg)} 100%{transform:translateX(0) rotate(-2deg)} }
  @keyframes hop { 0%{transform:translateY(0)} 40%{transform:translateY(-10px) scale(1.06)} 100%{transform:translateY(0)} }

  #scorebox { flex:1; background:#FFFDF7; border-radius:18px; padding:6px 14px; box-shadow:0 3px 0 rgba(140,90,40,.18); text-align:center; }
  #scorelabel { font-size:12px; color:#B98A5E; letter-spacing:2px; }
  #score { font-size:30px; color:#6B4226; line-height:1; }
  .btn { border:none; cursor:pointer; font-family:inherit; border-radius:16px; box-shadow:0 3px 0 rgba(140,90,40,.25); }
  #bell {
    width:56px; height:56px; font-size:26px; background:#FFE28A; position:relative;
    transition: transform .1s;
  }
  #bell:active { transform:scale(.92); }
  #bell.used { background:#E7DFD2; filter:grayscale(.9); box-shadow:none; }
  #bell .badge { position:absolute; top:-4px; right:-4px; background:#FF6B8A; color:#fff; font-size:12px; width:20px; height:20px; border-radius:50%; line-height:20px; }
  #bell.used .badge { display:none; }
  #restart { width:56px; height:56px; font-size:24px; background:#BDE8C8; }

  /* ── 보드 ── */
  #boardwrap { position:relative; }
  #board { display:block; border-radius:22px; box-shadow:0 6px 0 rgba(140,90,40,.22), 0 14px 30px rgba(140,90,40,.15); }
  #board.shake { animation: shake .3s; }
  @keyframes shake { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-5px,2px)} 50%{transform:translate(4px,-3px)} 75%{transform:translate(-3px,-2px)} }

  /* ── 트레이 ── */
  #tray { width:100%; display:flex; justify-content:space-around; gap:8px; background:#FFFDF7; border-radius:20px; padding:10px 6px; box-shadow:0 4px 0 rgba(140,90,40,.15); }
  .slot { width:clamp(60px, min(23vw, 13vh), 96px); aspect-ratio:1; touch-action:none; }
  .slot canvas { width:100%; height:100%; animation: bob 2.4s ease-in-out infinite; }
  .slot.used canvas { animation:none; opacity:.15; }
  .slot:nth-child(2) canvas { animation-delay:.4s; } .slot:nth-child(3) canvas { animation-delay:.8s; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  /* ── 드래그 고스트 ── */
  #drag { position:fixed; left:0; top:0; pointer-events:none; z-index:50; display:none; filter:drop-shadow(0 10px 8px rgba(120,70,30,.3)); }

  /* ── 첫 실행 힌트 (텍스트 0 — Pillar 2) ── */
  #hint { position:absolute; font-size:44px; z-index:40; pointer-events:none; animation: hintmove 1.8s ease-in-out infinite; filter:drop-shadow(0 3px 3px rgba(0,0,0,.25)); }
  @keyframes hintmove { 0%{transform:translate(0,0); opacity:0} 15%{opacity:1} 70%{transform:translate(-30px,-150px); opacity:1} 100%{transform:translate(-30px,-150px); opacity:0} }

  /* ── 게임오버 ── */
  #over {
    position:fixed; inset:0; background:rgba(90,50,30,.45); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; z-index:100;
  }
  #over.show { display:flex; }
  #overcard { background:#FFFDF7; border-radius:26px; padding:26px 34px; text-align:center; box-shadow:0 8px 0 rgba(140,90,40,.3); animation:popin .35s cubic-bezier(.34,1.56,.64,1); }
  @keyframes popin { from{transform:scale(.6); opacity:0} to{transform:scale(1); opacity:1} }
  #overmascot { width:90px; height:90px; margin:0 auto 6px; }
  #overscore { font-size:44px; color:#6B4226; }
  #overcause { font-size:15px; color:#B98A5E; margin:4px 0 14px; }
  #replay { font-size:22px; background:#FF9EB5; color:#fff; padding:10px 40px; border-radius:20px; }
  #replay:active { transform:scale(.94); }

  #seed { font-size:11px; color:#C9AE8F; margin-top:2px; }

  /* ── 난이도 티어 핍 (세션3) — 커브 상시 노출, 텍스트 0 ── */
  #tierpips { display:flex; flex-direction:column; gap:4px; justify-content:center; margin-left:2px; }
  #tierpips .pip { width:9px; height:9px; border-radius:50%; background:#E8D9C3; display:block; transition:background .4s; }
  #tierpips .pip.on { background:#FF7043; box-shadow:0 0 6px rgba(255,112,67,.5); }

  /* ── 세션5: 상태 스트립 (Toss: 1순위 신호 = 구할 대상·다음 위협) ── */
  #status { min-height:20px; font-size:14px; color:#8D6B4A; text-align:center; margin:2px 0; letter-spacing:.5px; }

  /* ── 세션5: 버리기 통 ── */
  #bin { width:64px; height:88px; border-radius:16px; border:2px dashed #C9A87F; display:flex; align-items:center; justify-content:center; font-size:26px; opacity:.75; transition:all .15s; align-self:center; }
  #bin.hot { background:#FFE3D6; border-color:#FF7043; transform:scale(1.08); opacity:1; }

  /* ── 세션5·7: 설명 토스트 — 보드 상단 앵커 (트레이/통과 구조적으로 못 겹침) ── */
  #toast { position:absolute; left:50%; top:10px; transform:translateX(-50%) translateY(-6px); background:rgba(74,46,23,.92); color:#FFF6E8; font-size:14px; padding:9px 16px; border-radius:14px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:60; max-width:92%; text-align:center; box-sizing:border-box; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── 세션7: 상용 폴리시 — safe-area·스크롤 바운스 방지·탭 하이라이트 제거·짧은 화면 압축 ── */
  html, body { overscroll-behavior:none; }
  * { -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  #wrap { padding-bottom:env(safe-area-inset-bottom); padding-top:env(safe-area-inset-top); }
  @media (max-height: 700px) {
    #mascot { width:44px; height:44px; }
    #scorebox { padding:4px 14px; }
    #score { font-size:24px; }
    #seed { display:none; }
    #bin { height:72px; }
  }

  /* ── 세션7: 결과 스탯 + 신기록 ── */
  #overstats { font-size:14px; color:#8D6B4A; margin:2px 0 10px; line-height:1.7; }
  #newbest { display:none; font-size:15px; color:#FF6E9C; margin-bottom:6px; animation:popin .4s cubic-bezier(.34,1.56,.64,1); }
  #newbest.show { display:block; }

  #quit, #share { font-size:16px; background:#FFF; color:#B98A5E; border:2px solid #F0D9BE; padding:8px 22px; border-radius:16px; margin-top:8px; }
  #quit:active, #share:active { transform:scale(.94); }
  #share { color:#FF6E9C; border-color:#FFD3E0; }
  #quit { margin-left:6px; }

  /* ── 세션12·13: 도감(❓)·모드 선택(🎮) 팝업 ── */
  #dex, #modes { position:fixed; inset:0; background:rgba(90,50,30,.45); backdrop-filter:blur(3px); display:none; align-items:center; justify-content:center; z-index:110; }
  #dex.show, #modes.show { display:flex; }
  #dexcard, #modescard { background:#FFFDF7; border-radius:24px; padding:20px 22px 16px; width:min(340px, 88vw); max-height:76vh; overflow-y:auto; box-shadow:0 8px 0 rgba(140,90,40,.3); animation:popin .3s cubic-bezier(.34,1.56,.64,1); }
  #dexcard h3, #modescard h3 { font-size:18px; color:#6B4226; margin:2px 0 10px; text-align:center; }
  .moderow { cursor:pointer; border-radius:14px; }
  .moderow:active { background:#FFF0E0; transform:scale(.98); }
  #modesclose { display:block; margin:12px auto 0; font-size:16px; background:#FFF; color:#B98A5E; border:2px solid #F0D9BE; padding:8px 30px; border-radius:16px; }
  .dexrow { display:flex; align-items:center; gap:12px; padding:7px 2px; border-bottom:1px solid #F4E6D2; }
  .dexrow:last-of-type { border-bottom:none; }
  .dexrow canvas, .dexrow .dexemoji { width:44px; height:44px; flex:none; }
  .dexemoji { font-size:32px; text-align:center; line-height:44px; }
  .dexrow b { font-size:14px; color:#6B4226; display:block; }
  .dexrow span { font-size:12px; color:#A0805E; line-height:1.45; }
  #dexclose { display:block; margin:12px auto 0; font-size:16px; background:#FF9EB5; color:#fff; padding:8px 34px; border-radius:16px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="header">
    <svg id="mascot" viewBox="0 0 100 100">
      <!-- 치피: 오리지널 쿠키 마스코트 (clean-room) -->
      <circle cx="50" cy="52" r="40" fill="#E8A25C"/>
      <circle cx="50" cy="52" r="40" fill="none" stroke="#C97E3A" stroke-width="3"/>
      <path d="M20 38 Q50 12 80 38 L80 30 Q50 6 20 30 Z" fill="#FF9EB5"/>
      <circle cx="28" cy="24" r="4" fill="#FFF3DC"/><circle cx="50" cy="18" r="4" fill="#FFF3DC"/><circle cx="72" cy="24" r="4" fill="#FFF3DC"/>
      <circle cx="30" cy="62" r="6" fill="#FFB3C7" opacity=".7"/><circle cx="70" cy="62" r="6" fill="#FFB3C7" opacity=".7"/>
      <g class="face-idle">
        <circle cx="38" cy="50" r="5" fill="#4A2E17"/><circle cx="62" cy="50" r="5" fill="#4A2E17"/>
        <circle cx="39.5" cy="48.5" r="1.6" fill="#fff"/><circle cx="63.5" cy="48.5" r="1.6" fill="#fff"/>
        <path d="M43 62 Q50 68 57 62" stroke="#4A2E17" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <g class="face-worried">
        <circle cx="38" cy="50" r="5.5" fill="#4A2E17"/><circle cx="62" cy="50" r="5.5" fill="#4A2E17"/>
        <circle cx="39" cy="48" r="2" fill="#fff"/><circle cx="63" cy="48" r="2" fill="#fff"/>
        <path d="M31 41 L44 44 M69 41 L56 44" stroke="#4A2E17" stroke-width="3" stroke-linecap="round"/>
        <ellipse cx="50" cy="65" rx="6" ry="7" fill="#4A2E17"/>
        <path d="M76 36 q4 6 0 10" stroke="#7EC8E3" stroke-width="4" fill="none" stroke-linecap="round"/>
      </g>
      <g class="face-cheer">
        <path d="M32 50 Q38 44 44 50 M56 50 Q62 44 68 50" stroke="#4A2E17" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M41 60 Q50 70 59 60" stroke="#4A2E17" stroke-width="3.5" fill="#FF8FA8" stroke-linecap="round"/>
      </g>
      <g class="face-ko">
        <path d="M33 45 L43 55 M43 45 L33 55 M57 45 L67 55 M67 45 L57 55" stroke="#4A2E17" stroke-width="3.5" stroke-linecap="round"/>
        <ellipse cx="50" cy="66" rx="5" ry="4" fill="#4A2E17"/>
      </g>
    </svg>
    <div id="scorebox">
      <div id="scorelabel">SCORE</div>
      <div id="score">0</div>
    </div>
    <button id="bell" class="btn">🔔<span class="badge">1</span></button>
    <button id="mode" class="btn" title="모드 선택">🎮</button>
    <button id="photo" class="btn" title="소중한 것 등록">📷</button>
    <button id="help" class="btn" title="도감">❓</button>
    <button id="mute" class="btn" title="소리 켜기/끄기">🔊</button>
    <button id="restart" class="btn" title="새 판 시작">↺</button>
    <div id="tierpips" title=""></div>
  </div>

  <div id="status"></div>

  <div id="boardwrap">
    <canvas id="board"></canvas>
    <div id="hint" style="display:none">👆</div>
    <div id="toast"></div>
  </div>

  <div id="tray">
    <div class="slot" data-slot="0"><canvas></canvas></div>
    <div class="slot" data-slot="1"><canvas></canvas></div>
    <div class="slot" data-slot="2"><canvas></canvas></div>
    <div id="bin">🗑️</div>
  </div>
  <div id="seed"></div>
</div>

<div id="toast"></div>

<canvas id="drag"></canvas>
<input type="file" id="photoinput" accept="image/*" multiple style="display:none">

<div id="dex">
  <div id="dexcard">
    <h3>도감</h3>
    <div id="dexlist"></div>
    <button id="dexclose" class="btn">닫기</button>
  </div>
</div>

<div id="modes">
  <div id="modescard">
    <h3>모드 선택</h3>
    <div class="dexrow moderow" id="mode-classic"><div class="dexemoji">♾️</div><div><b>클래식</b><span>끝없이 버티며 최고 점수에 도전해요</span></div></div>
    <div class="dexrow moderow" id="mode-stage"><div class="dexemoji">🗼</div><div><b>스테이지</b><span id="stageinfo">임무를 완수하며 올라가요</span></div></div>
    <div class="dexrow moderow" id="mode-defense"><div class="dexemoji">🛡️</div><div><b>디펜스</b><span>한가운데 소중한 것 — 몰려오는 까마귀를 막아요</span></div></div>
    <button id="modesclose" class="btn">닫기</button>
  </div>
</div>

<div id="over">
  <div id="overcard">
    <svg id="overmascot" viewBox="0 0 100 100">
      <circle cx="50" cy="52" r="40" fill="#E8A25C"/><circle cx="50" cy="52" r="40" fill="none" stroke="#C97E3A" stroke-width="3"/>
      <path d="M20 38 Q50 12 80 38 L80 30 Q50 6 20 30 Z" fill="#FF9EB5"/>
      <path d="M33 45 L43 55 M43 45 L33 55 M57 45 L67 55 M67 45 L57 55" stroke="#4A2E17" stroke-width="3.5" stroke-linecap="round"/>
      <ellipse cx="50" cy="66" rx="5" ry="4" fill="#4A2E17"/>
    </svg>
    <div id="newbest">🏆 새 기록!</div>
    <div id="overscore">0</div>
    <div id="overcause"></div>
    <div id="overstats"></div>
    <button id="replay" class="btn">다시 하기</button>
    <br>
    <button id="share" class="btn">공유하기</button>
    <button id="quit" class="btn">종료하기</button>
  </div>
</div>

<script>
// 텔레그래프 퍼즐 코어 로직 — 순수 함수(렌더 0), 브라우저·node 겸용. rng 단일화(seed 기반, Math.random/Date 금지 — INV-D1 준수).
// 규칙 요약: 8x8 보드, 조각 드래그 배치(입력 1종). 모든 위협은 예고됨(균열=구멍化, 젤리=칸 점유). 균열은 덮으면 해체(+보너스), 젤리는 줄 완성에 포함(유도 묘수). 배치 불가 = 게임 오버(사인 가독).
(function (root, factory) {
  if (typeof module !== 'undefined' && module.exports) module.exports = factory();
  else root.CORE = factory();
})(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

  var N = 8;
  var EMPTY = 0, BLOCK = 1, JELLY = 2, HOLE = 3;
  // 세션4 (디펜스 피벗): BABY = 지켜야 할 블록(줄 클리어 = 구출), CRUST = 굳은 설탕(줄 차단, 인접 클리어로 파괴), SLIME = 초코 슬라임(번짐)
  var BABY = 4, CRUST = 5, SLIME = 6;
  var NCOLORS = 5; // 색 마카롱용 코어 색상 수 (캔디크러시 관례: 적을수록 색 타겟팅이 전략적)

  // ── 결정론 RNG (mulberry32, 상태 명시) ──
  function rand(state) {
    state.rngState = (state.rngState + 0x6D2B79F5) | 0;
    var t = state.rngState;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
  function randInt(state, n) { return Math.floor(rand(state) * n); }

  // ── 조각 정의 (Block Blast 계열 표준 세트) ──
  var SHAPES = [
    { id: 'dot',  m: [[1]] },
    { id: 'i2h',  m: [[1, 1]] },
    { id: 'i2v',  m: [[1], [1]] },
    { id: 'i3h',  m: [[1, 1, 1]] },
    { id: 'i3v',  m: [[1], [1], [1]] },
    { id: 'sq2',  m: [[1, 1], [1, 1]] },
    { id: 'l3',   m: [[1, 0], [1, 1]] },
    { id: 'j3',   m: [[0, 1], [1, 1]] },
    { id: 'l4',   m: [[1, 0], [1, 0], [1, 1]] },
    { id: 't4',   m: [[1, 1, 1], [0, 1, 0]] },
    { id: 's4',   m: [[0, 1, 1], [1, 1, 0]] },
    { id: 'i4h',  m: [[1, 1, 1, 1]] },
    // 특수 아이템 (콤보/구출 보상 전용 — 리필 랜덤 등장 없음, 전부 드래그 배치 1칸 = 입력 1종 유지)
    { id: 'bomb',     m: [[1]] }, // 세션3: 3×3 폭발 (2연쇄 보상)
    { id: 'rocket_h', m: [[1]] }, // 세션4: 가로 롤링핀 — 행 전체 클리어 (3연쇄 보상, 세로와 교대)
    { id: 'rocket_v', m: [[1]] }, // 세션4: 세로 롤링핀 — 열 전체 클리어
    { id: 'macaron',  m: [[1]] }  // 세션4: 색 마카롱 — 인접 블록 색 전멸 (아기 구출 보상, 작가 확정)
  ];
  var PLAYABLE = 12;  // 리필 추첨 대상 (특수 제외)
  var BOMB = 12, ROCKET_H = 13, ROCKET_V = 14, MACARON = 15;

  var SPAWN_EVERY = 3;   // 배치 N회마다 위협 1개 예고 (티어1 기준 — difficulty() 참조)
  var COUNTDOWN = 3;     // 예고 → 발동까지 배치 수
  var MAX_THREATS = 4;   // 동시 위협 절대 상한 (가독성 — 위협 '수' 아닌 '조합'으로 난이도)

  // 난이도 커브 (세션3·4) — 배치 수 기반 고정 커브. 성과 기반 몰래 보정 아님 = Active DDA 계약 준수. 티어 핍으로 상시 노출.
  // 세션4: 위협 종류도 티어별 순차 등장(캔디크러시 방식) — 첫 10초 이해(Pillar 2)를 지키면서 뒤로 갈수록 몰아침.
  // 세션12 (작가 피드백 "선택 강제"): 티어3+는 스폰 이벤트당 위협 2개 — 전부 못 막는 상황을 의도적으로 생성 (까마귀 잡으면 균열을 포기하는 삼중 판단)
  function difficulty(placements) {
    if (placements >= 70) return { tier: 4, spawnEvery: 2, maxThreats: 5, spawnCount: 2, weights: [['crack', 0.3], ['jelly', 0.15], ['crust', 0.3], ['slime', 0.25]], crowChance: 0.45 };
    if (placements >= 40) return { tier: 3, spawnEvery: 2, maxThreats: 4, spawnCount: 2, weights: [['crack', 0.35], ['jelly', 0.2], ['crust', 0.25], ['slime', 0.2]], crowChance: 0.35 };
    if (placements >= 20) return { tier: 2, spawnEvery: 3, maxThreats: 3, spawnCount: 1, weights: [['crack', 0.4], ['jelly', 0.25], ['crust', 0.35]], crowChance: 0.25 }; // 세션5: 까마귀 조기 등장
    return { tier: 1, spawnEvery: 3, maxThreats: 2, spawnCount: 1, weights: [['crack', 0.6], ['jelly', 0.4]], crowChance: 0 };
  }

  // ── 세션13: 스테이지 임무 (작가 확정 — 쿠키런 모험의 탑 방식). 시간 목표는 턴제 정합상 "수 제한"으로 구현.
  var STAGES = [
    { goal: { type: 'color', color: 2, n: 12 }, diffBoost: 0 },              // 1. 코딱지맛 12개
    { goal: { type: 'rescue', n: 1 }, diffBoost: 18 },                       // 2. 소중한 것 1 구출
    { goal: { type: 'score', score: 250, moves: 25 }, diffBoost: 10 },       // 3. 25수 안에 250점
    { goal: { type: 'color', color: 4, n: 20 }, diffBoost: 15 },             // 4. 가지맛 20개
    { goal: { type: 'rescue', n: 2 }, diffBoost: 24 },                       // 5. 구출 2
    { goal: { type: 'score', score: 500, moves: 35 }, diffBoost: 25 },       // 6. 35수 안에 500점
    { goal: { type: 'color', color: 0, n: 30 }, diffBoost: 35 },             // 7. 딸기맛 30개
    { goal: { type: 'rescue', n: 3 }, diffBoost: 44 },                       // 8. 구출 3
    { goal: { type: 'score', score: 900, moves: 45 }, diffBoost: 50 },       // 9. 45수 안에 900점
    { goal: { type: 'rescue', n: 4 }, diffBoost: 62 }                        // 10. 구출 4
  ];
  var DEFENSE_BABY = [3, 4]; // 세션13: 디펜스 모드 — 중앙 영구 고정 보호 대상 (작가 예시)

  // opts: { mode: 'classic'|'stage'|'defense', stage: 0-based }
  function newGame(seed, opts) {
    opts = opts || {};
    var state = {
      mode: opts.mode || 'classic',
      stage: opts.mode === 'stage' ? (opts.stage | 0) : null,
      goal: opts.mode === 'stage' ? STAGES[Math.min(opts.stage | 0, STAGES.length - 1)].goal : null,
      diffBoost: opts.mode === 'stage' ? STAGES[Math.min(opts.stage | 0, STAGES.length - 1)].diffBoost : (opts.mode === 'defense' ? 10 : 0),
      colorCleared: [0, 0, 0, 0, 0], // 색별 파괴 누계 (임무 추적)
      totalRescued: 0,
      crowsDefused: 0,               // 디펜스 웨이브 카운터
      seed: seed | 0,
      rngState: seed | 0,
      grid: [],
      colors: [],         // 세션4: 칸별 색 인덱스 (0..NCOLORS-1 | null) — 마카롱 타겟팅용, 코어 관리
      threats: [],        // {r, c, type:'crack'|'jelly'|'crust'|'slime'|'crow', countdown}
      tray: [],
      trayColors: [],     // 세션4: 트레이 조각 색 (특수 아이템 = null)
      placements: 0,
      score: 0,
      combo: 0,
      lastBabyAt: 8,      // 세션4: 아기 등장 페이싱 (첫 아기 = 배치 20)
      rocketFlip: false,  // 세션4: 롤링핀 가로/세로 교대
      bellUsed: false,
      over: false,
      overCause: null,
      telemetry: { coverageLost: 0 }, // 세션3: 대응 가능성 상실 전이 계수
      events: []          // 마지막 place()의 이벤트 (UI 주스용)
    };
    for (var r = 0; r < N; r++) {
      var row = [], crow = [];
      for (var c = 0; c < N; c++) { row.push(EMPTY); crow.push(null); }
      state.grid.push(row);
      state.colors.push(crow);
    }
    if (state.mode === 'defense') state.grid[DEFENSE_BABY[0]][DEFENSE_BABY[1]] = BABY; // 중앙 영구 고정
    refillTray(state);
    return state;
  }

  // 세션13: 임무 판정 — 달성 시 즉시 승리 종료 (overCause 'clear')
  function checkGoal(state) {
    if (state.mode !== 'stage' || !state.goal || state.over) return;
    var g = state.goal, done = false;
    if (g.type === 'color') done = state.colorCleared[g.color] >= g.n;
    else if (g.type === 'rescue') done = state.totalRescued >= g.n;
    else if (g.type === 'score') done = state.score >= g.score;
    if (done) { state.over = true; state.overCause = 'clear'; }
  }
  function checkMovesLimit(state) {
    if (state.mode !== 'stage' || !state.goal || state.over) return;
    if (state.goal.type === 'score' && state.placements >= state.goal.moves) {
      state.over = true; state.overCause = 'moves'; // 수 소진 (사인 가독)
    }
  }

  function refillTray(state) {
    state.tray = [];
    state.trayColors = [];
    for (var i = 0; i < 3; i++) {
      state.tray.push(randInt(state, PLAYABLE));
      state.trayColors.push(randInt(state, NCOLORS));
    }
  }

  function shapeCells(shapeIdx, r, c) {
    var m = SHAPES[shapeIdx].m, cells = [];
    for (var i = 0; i < m.length; i++)
      for (var j = 0; j < m[i].length; j++)
        if (m[i][j]) cells.push([r + i, c + j]);
    return cells;
  }

  function canPlace(state, shapeIdx, r, c) {
    if (shapeIdx == null || state.tray.indexOf(shapeIdx) === -1 && !SHAPES[shapeIdx]) return false;
    // 세션12 (작가 피드백): 특수 아이템은 아무 칸이나 타겟 가능 — 폭탄은 점유 칸 중심 9칸, 마카롱은 원하는 젤리 위에 드롭
    if (shapeIdx >= BOMB) return r >= 0 && c >= 0 && r < N && c < N;
    var cells = shapeCells(shapeIdx, r, c);
    for (var k = 0; k < cells.length; k++) {
      var rr = cells[k][0], cc = cells[k][1];
      if (rr < 0 || cc < 0 || rr >= N || cc >= N) return false;
      if (state.grid[rr][cc] !== EMPTY) return false; // 균열 예고 칸은 EMPTY → 덮기(해체) 가능
    }
    return true;
  }

  function threatAt(state, r, c) {
    for (var i = 0; i < state.threats.length; i++)
      if (state.threats[i].r === r && state.threats[i].c === c) return state.threats[i];
    return null;
  }

  function emptyCellsWithoutThreat(state) {
    var out = [];
    for (var r = 0; r < N; r++)
      for (var c = 0; c < N; c++)
        if (state.grid[r][c] === EMPTY && !threatAt(state, r, c)) out.push([r, c]);
    return out;
  }

  // ── 세션4 헬퍼 ──
  function findBaby(state) {
    for (var r = 0; r < N; r++) for (var c = 0; c < N; c++) if (state.grid[r][c] === BABY) return [r, c];
    return null;
  }
  function babyNear(state, r, c) { // 체비쇼프 거리 1 이내
    for (var dr = -1; dr <= 1; dr++) for (var dc = -1; dc <= 1; dc++) {
      var rr = r + dr, cc = c + dc;
      if (rr >= 0 && cc >= 0 && rr < N && cc < N && state.grid[rr][cc] === BABY) return true;
    }
    return false;
  }
  // 위협 해체 (칸 기준) — 보너스: 균열 +25, 까마귀 +50, 슬라임 예고 +15
  function defuseAt(state, ev, r, c) {
    var th = threatAt(state, r, c);
    if (!th) return;
    state.threats.splice(state.threats.indexOf(th), 1);
    ev.defused.push([r, c]);
    if (th.type === 'crack') ev.gained += 25;
    else if (th.type === 'crow') { ev.gained += 50; if (state.crowsDefused != null) state.crowsDefused++; } // 디펜스 웨이브 카운트
    else if (th.type === 'slime') ev.gained += 15;
  }
  // 아이템의 칸 파괴 공통 처리 — HOLE 유지, BABY = 구출(+100), CRUST +15, SLIME +10
  function itemClearCell(state, ev, rr, cc, log) {
    var v = state.grid[rr][cc];
    if (v === BLOCK) { ev.gained += 2; if (state.colorCleared && state.colors[rr][cc] != null) state.colorCleared[state.colors[rr][cc]]++; } // 임무 추적 (세션13)
    else if (v === JELLY) { ev.gained += 2; }
    else if (v === CRUST) { ev.gained += 15; ev.broke.push([rr, cc, 'crust']); }
    else if (v === SLIME) { ev.gained += 10; ev.slimeKilled = true; ev.broke.push([rr, cc, 'slime']); }
    else if (v === BABY) {
      if (state.mode === 'defense') { defuseAt(state, ev, rr, cc); return; } // 디펜스: 고정 보호 대상 — 아이템으로도 제거 불가
      ev.gained += 100; ev.rescued++;
    }
    else { defuseAt(state, ev, rr, cc); return; } // EMPTY: 예고만 해체
    state.grid[rr][cc] = EMPTY;
    state.colors[rr][cc] = null;
    if (log) log.push([rr, cc]);
    defuseAt(state, ev, rr, cc);
  }

  // 위협 카운트다운 + 발동 — 틱 1회 (배치·버리기 공용). RNG 미사용.
  function tickThreats(state, ev) {
    var remaining = [];
    for (var i = 0; i < state.threats.length; i++) {
      var t = state.threats[i];
      t.countdown--;
      if (t.countdown <= 0) {
        if (t.type === 'crow') {
          // 도둑 까마귀 (세션4): 발동 시 아기가 인접(8방)해 있으면 잡아먹음 = 즉시 게임오버 (작가 확정)
          if (babyNear(state, t.r, t.c)) {
            state.over = true;
            state.overCause = 'baby';
            ev.babyEaten = [t.r, t.c];
            ev.fired.push([t.r, t.c, 'crow']);
          } // 아기가 벗어났으면 불발
        } else if (t.type === 'crust') {
          // 굳은 설탕 (세션4): 내 블록을 굳힘 — 줄 완성 차단. 블록이 먼저 사라졌으면 불발
          if (state.grid[t.r][t.c] === BLOCK) {
            state.grid[t.r][t.c] = CRUST; state.colors[t.r][t.c] = null;
            ev.fired.push([t.r, t.c, 'crust']);
          }
        } else if (t.type === 'slime') {
          if (state.grid[t.r][t.c] === EMPTY) { state.grid[t.r][t.c] = SLIME; ev.fired.push([t.r, t.c, 'slime']); }
        } else if (state.grid[t.r][t.c] === EMPTY) {
          state.grid[t.r][t.c] = (t.type === 'crack') ? HOLE : JELLY;
          ev.fired.push([t.r, t.c, t.type]);
        }
      } else remaining.push(t);
    }
    state.threats = remaining;
  }

  // 실행 코어 (배치/아이템 → 카운트다운 → 연쇄) — place()와 previewPlace()가 공유.
  // RNG 미사용 구간 = 결정론과 순수 미리보기 동시 보장.
  function resolveAction(state, shapeIdx, r, c, ev, pieceColor) {
    if (shapeIdx === BOMB) {
      // 폭탄 (세션3): 3×3 파괴
      ev.bomb = { r: r, c: c, cleared: [] };
      for (var br = r - 1; br <= r + 1; br++) for (var bc = c - 1; bc <= c + 1; bc++) {
        if (br < 0 || bc < 0 || br >= N || bc >= N) continue;
        itemClearCell(state, ev, br, bc, ev.bomb.cleared);
      }
    } else if (shapeIdx === ROCKET_H || shapeIdx === ROCKET_V) {
      // 롤링핀 (세션4): 행/열 전체 파괴
      ev.rocket = { r: r, c: c, dir: shapeIdx === ROCKET_H ? 'h' : 'v', cleared: [] };
      for (var k1 = 0; k1 < N; k1++) {
        if (shapeIdx === ROCKET_H) itemClearCell(state, ev, r, k1, ev.rocket.cleared);
        else itemClearCell(state, ev, k1, c, ev.rocket.cleared);
      }
    } else if (shapeIdx === MACARON) {
      // 색 마카롱 (세션4, 작가 확정): 인접(상>우>하>좌) 블록 색 중 최다 색을 보드 전체에서 파괴
      ev.macaronColor = macaronTarget(state, r, c);
      ev.macaron = { r: r, c: c, cleared: [] };
      defuseAt(state, ev, r, c);
      if (ev.macaronColor != null) {
        for (var mr = 0; mr < N; mr++) for (var mc = 0; mc < N; mc++)
          if (state.grid[mr][mc] === BLOCK && state.colors[mr][mc] === ev.macaronColor) {
            state.grid[mr][mc] = EMPTY; state.colors[mr][mc] = null;
            ev.macaron.cleared.push([mr, mc]); ev.gained += 2;
          }
      }
    } else {
      // 1) 배치 (+예고 칸 덮으면 해체) — 색 기록
      var cells = shapeCells(shapeIdx, r, c);
      for (var k = 0; k < cells.length; k++) {
        var rr = cells[k][0], cc = cells[k][1];
        state.grid[rr][cc] = BLOCK;
        state.colors[rr][cc] = (pieceColor == null ? 0 : pieceColor);
        ev.placed.push([rr, cc]);
        defuseAt(state, ev, rr, cc);
      }
      ev.gained += cells.length;
    }

    // 2) 위협 카운트다운 + 발동
    tickThreats(state, ev);
    if (state.over) return; // 아기 피탈 — 사망 순간 보드 동결(사인 가독)

    // 3) 줄 클리어 + 중력 + 연쇄
    runChains(state, ev, !!(ev.bomb || ev.rocket || ev.macaron));
  }

  // 줄 클리어 + 중력 낙하 + 콤보 연쇄 (세션2 과제 B + 세션4 확장) — 배치·아이템·버리기 공용.
  // 클리어 → 인접 설탕/슬라임 파괴 → 낙하 → 새 줄 재클리어 반복. 전 과정 RNG 0회 = 결정론.
  // 아기 포함 줄 클리어 = 구출(+100). 낙하 착지 해체 유지.
  function runChains(state, ev, itemPass) {
    var chained = false;
    for (;;) {
      var lines = findFullLines(state);
      if (lines.keys.length === 0 && !itemPass) break;
      itemPass = false;
      if (lines.keys.length) { chained = true; state.combo++; }
      var step = { clearedLines: lines.count, clearedCells: [], fell: [], defused: [], broke: [], gained: 0 };
      var jellyBonus = 0;
      for (var q = 0; q < lines.keys.length; q++) {
        var kp = lines.keys[q].split(','), rr3 = +kp[0], cc3 = +kp[1];
        var cv = state.grid[rr3][cc3];
        if (cv === JELLY) { jellyBonus += 5; ev.jellyCleared++; }
        if (cv === BABY) {
          if (state.mode === 'defense') continue; // 디펜스: 줄은 지워져도 보호 대상은 영구 고정 (구출 없음)
          step.gained += 100; ev.rescued++; // 구출!
        }
        if (cv === BLOCK && state.colorCleared && state.colors[rr3][cc3] != null) state.colorCleared[state.colors[rr3][cc3]]++; // 임무 추적
        state.grid[rr3][cc3] = EMPTY;
        state.colors[rr3][cc3] = null;
        step.clearedCells.push([rr3, cc3]);
        ev.clearedCells.push([rr3, cc3]);
      }
      step.gained += lines.count * 10 * state.combo + jellyBonus;
      // 인접 파괴 (세션4, 캔디크러시 방식): 클리어 칸의 상하좌우 굳은 설탕(+15)·슬라임(+10) 파괴 — 중력보다 먼저
      var DIRS = [[-1, 0], [0, 1], [1, 0], [0, -1]];
      for (var q2 = 0; q2 < step.clearedCells.length; q2++) {
        for (var dd = 0; dd < 4; dd++) {
          var ar = step.clearedCells[q2][0] + DIRS[dd][0], ac = step.clearedCells[q2][1] + DIRS[dd][1];
          if (ar < 0 || ac < 0 || ar >= N || ac >= N) continue;
          if (state.grid[ar][ac] === CRUST) { state.grid[ar][ac] = EMPTY; step.gained += 15; step.broke.push([ar, ac, 'crust']); ev.broke.push([ar, ac, 'crust']); }
          else if (state.grid[ar][ac] === SLIME) { state.grid[ar][ac] = EMPTY; step.gained += 10; ev.slimeKilled = true; step.broke.push([ar, ac, 'slime']); ev.broke.push([ar, ac, 'slime']); }
        }
      }
      // 중력: 열 단위 압축 — HOLE은 지형(관통 금지), 나머지는 전부 낙하(색 동반)
      step.fell = applyGravity(state);
      for (var f = 0; f < step.fell.length; f++) ev.fell.push(step.fell[f]);
      // 굳은설탕 예고는 타겟 블록을 따라 이동 (블록이 떨어지면 예고도 함께)
      for (var f2 = 0; f2 < step.fell.length; f2++) {
        var mv2 = step.fell[f2];
        for (var d2 = 0; d2 < state.threats.length; d2++) {
          var thm = state.threats[d2];
          if (thm.type === 'crust' && thm.r === mv2[0] && thm.c === mv2[1]) { thm.r = mv2[2]; thm.c = mv2[3]; }
        }
      }
      // 낙하 착지 해체 (예고 칸이 점유되면 위협 제거)
      var keep = [];
      for (var d = 0; d < state.threats.length; d++) {
        var th2 = state.threats[d];
        if (th2.type !== 'crust' && state.grid[th2.r][th2.c] !== EMPTY) {
          step.defused.push([th2.r, th2.c]);
          ev.defused.push([th2.r, th2.c]);
          if (th2.type === 'crack') step.gained += 25;
          else if (th2.type === 'crow') step.gained += 50;
          else if (th2.type === 'slime') step.gained += 15;
        } else if (th2.type === 'crust' && state.grid[th2.r][th2.c] !== BLOCK) {
          // 세션5 (작가 피드백): 타겟 블록이 사라지면 설탕 예고도 즉시 소멸 — "빈 칸 위 설탕 예고" 불합리 제거
          ev.fizzled.push([th2.r, th2.c, 'crust']);
        } else keep.push(th2);
      }
      state.threats = keep;
      // 폭탄 헛스윙(변화 0) — 빈 스텝 미기록
      if (!lines.keys.length && !step.fell.length && !step.defused.length && !step.clearedCells.length) break;
      ev.clearedLines += step.clearedLines;
      ev.gained += step.gained;
      ev.chain.push(step);
    }
    if (!chained) state.combo = 0;
  }

  function newEv() {
    return {
      placed: [], defused: [], fired: [], spawned: [], broke: [],
      clearedLines: 0, clearedCells: [], jellyCleared: 0, rescued: 0, gained: 0,
      fell: [], chain: [], bomb: null, rocket: null, macaron: null, macaronColor: null,
      bombGranted: false, granted: null, babyEaten: null, babySpawn: null, slimeSpread: null, slimeKilled: false,
      fizzled: [], discarded: null
    };
  }

  // 버리기 통 (세션5, 작가 확정): 조각을 버리면 모든 위협 카운트다운 1 전진(발동 포함) — "시간을 버리는" 선택.

    state.tray[trayPos] = null;

    checkGoal(state); // 세션13
    if (state.over) { state.events = ev; return ev; }
    if (state.tray[0] == null && state.tray[1] == null && state.tray[2] == null) refillTray(state);
    if (!state.telemetry) state.telemetry = { coverageLost: 0 };
    for (var ti = 0; ti < state.threats.length; ti++) {
      var tth = state.threats[ti];
      if (tth.type === 'crust') continue;
      var nowCov = canCoverCell(state, tth.r, tth.c);
      if (tth._cov !== false && !nowCov) state.telemetry.coverageLost++;

  // trayPos: 트레이 슬롯 index (0~2), r/c: 좌상단 보드 좌표
  function place(state, trayPos, r, c) {

    var shapeIdx = state.tray[trayPos];

    var ev = newEv();
    var pieceColor = state.trayColors ? state.trayColors[trayPos] : null;
    resolveAction(state, shapeIdx, r, c, ev, pieceColor);
    state.placements++;
    state.tray[trayPos] = null;
    if (state.trayColors) state.trayColors[trayPos] = null;
    state.score += ev.gained;
    state.totalRescued += ev.rescued;

    // 아기 피탈 = 즉시 게임오버 (작가 확정) — 이후 단계 전부 생략, 보드 동결
    if (state.over) { state.events = ev; return ev; }

    if (state.over) { state.events = ev; return ev; }

    if (state.tray[0] == null && state.tray[1] == null && state.tray[2] == null) refillTray(state);

    // 초코 슬라임 번짐 (세션4): 4배치마다, 그 턴에 슬라임을 잡았으면 억제. 무RNG 결정적(가장 위-왼쪽 슬라임의 상>우>하>좌 첫 빈 칸) — Pillar 1 유지.
    if (!ev.slimeKilled && state.placements % 4 === 0) {

          var SD = [[-1, 0], [0, 1], [1, 0], [0, -1]];

              state.grid[tr][tc] = SLIME;

            }
          }
        }
      }
    }

    // 아기 쿠키 등장 (세션4): 티어2부터, 보드에 1명, 12배치 간격. 구출 가능성 보장(행 또는 열에 구멍 없는 칸만).
    var effP = state.placements + (state.diffBoost || 0);
    if (state.mode !== 'defense' && difficulty(effP).tier >= 2 && !findBaby(state) && effP - state.lastBabyAt >= 12) {
      var bpool = [];
      for (var br2 = 0; br2 < N; br2++) for (var bc2 = 0; bc2 < N; bc2++) {

        var rowOk = true, colOk = true;
        for (var q3 = 0; q3 < N; q3++) {

          if (rv === HOLE || rv === CRUST || rv === SLIME) rowOk = false;

        if (rowOk || colOk) bpool.push([br2, bc2]);

      }
    }

    // 새 위협 예고 — 과제 A(coverable 검증) + 세션4 티어별 위협 풀.
    // ⚠️ 반드시 슬라임 번짐·아기 등장 등 모든 보드 변동 이후에 실행 — 스폰 후 보드가 바뀌면 coverable 보장이 깨진다 (세션4 시뮬에서 실측된 순서 결함 수정).
    var diff = difficulty(state.placements + (state.diffBoost || 0)); // 세션13: 스테이지/디펜스 난이도 부스트
    if (state.placements % diff.spawnEvery === 0) {

    for (var ti = 0; ti < state.threats.length; ti++) {

      var nowCov = canCoverCell(state, tth.r, tth.c);
      if (tth._cov !== false && !nowCov) state.telemetry.coverageLost++;

  }

  // 위협 스폰 (세션4): 티어 가중치 롤 → 타입별 후보 풀 → 후보 없으면 균열로 폴백, 그래도 없으면 보류.
  // 공정성: 빈 칸 타겟 위협(crack/jelly/slime/crow)은 coverable 검증. 설탕은 내 블록 타겟(비치명) — 검증 제외.

    var baby = findBaby(state);

    } else {

      for (var w = 0; w < diff.weights.length; w++) {

    }

    if (type === 'crust') {

      if (pool.length === 0) type = 'crack'; // 굳힐 블록 없음 → 폴백
    }

      }
      if (pool.length === 0) type = 'crack'; // 앉을 자리 없음 → 폴백
    }

  // 낙하/연쇄 미리보기 (세션3 — 완전 정보 강화): 클론 위에서 resolveAction 실행. 실상태·RNG 무변형(순수).
  function previewPlace(state, shapeIdx, r, c, pieceColor) {
    if (!canPlace(state, shapeIdx, r, c)) return null;
    var clone = {
      grid: JSON.parse(JSON.stringify(state.grid)),
      colors: JSON.parse(JSON.stringify(state.colors)),
      threats: JSON.parse(JSON.stringify(state.threats)),
      combo: state.combo, over: false, overCause: null,

    };

  // 가득 찬 줄 탐색 (BLOCK/JELLY/BABY = 채움 — 아기 포함 줄 클리어 = 구출 / HOLE·CRUST·SLIME = 방해)

    var fullRows = [], fullCols = [];

      for (var c = 0; c < N; c++) { if (!isFillCell(state.grid[r][c])) { full = false; break; } }
      if (full) fullRows.push(r);
    }
    for (var c2 = 0; c2 < N; c2++) {
      var full2 = true;
      for (var r2 = 0; r2 < N; r2++) { if (!isFillCell(state.grid[r2][c2])) { full2 = false; break; } }
      if (full2) fullCols.push(c2);

    var set = {};
    fullRows.forEach(function (rr) { for (var c3 = 0; c3 < N; c3++) set[rr + ',' + c3] = true; });
    fullCols.forEach(function (cc) { for (var r3 = 0; r3 < N; r3++) set[r3 + ',' + cc] = true; });

  // HOLE = 지형: 그 위에서부터 다시 쌓인다(관통 금지). 색 동반 이동. 반환: [fromR, fromC, toR, toC, 값] 목록.
  function applyGravity(state) {
    var moved = [];
    for (var c = 0; c < N; c++) {
      var write = N - 1;
      for (var r = N - 1; r >= 0; r--) {
        var v = state.grid[r][c];
        if (v === HOLE) { write = r - 1; continue; }
        if (v === BABY && state.mode === 'defense') { write = r - 1; continue; } // 디펜스: 보호 대상 = 지형 (고정)
        if (v !== EMPTY) {
          if (r !== write) {
            state.grid[write][c] = v;
            state.colors[write][c] = state.colors[r][c];
            state.grid[r][c] = EMPTY;
            state.colors[r][c] = null;
            moved.push([r, c, write, c, v]);
          }
          write--;
        }
      }
    }
    return moved;
  }

  // 색 마카롱 타겟 — 세션12 (작가 피드백): 원하는 젤리 '위에' 드롭 = 그 젤리의 맛. 빈 칸 드롭 시 인접 최다 색 폴백(세션4 규칙).
  function macaronTarget(state, r, c) {
    if (state.grid[r][c] === BLOCK && state.colors[r][c] != null) return state.colors[r][c];
    var DIRS = [[-1, 0], [0, 1], [1, 0], [0, -1]];
    var counts = {}, order = [];
    for (var i = 0; i < 4; i++) {
      var rr = r + DIRS[i][0], cc = c + DIRS[i][1];
      if (rr < 0 || cc < 0 || rr >= N || cc >= N) continue;
      if (state.grid[rr][cc] === BLOCK && state.colors[rr][cc] != null) {
        var col = state.colors[rr][cc];
        if (!(col in counts)) { counts[col] = 0; order.push(col); }
        counts[col]++;
      }
    }
    if (order.length === 0) return null;
    var best = order[0];
    for (var j = 1; j < order.length; j++) if (counts[order[j]] > counts[best]) best = order[j];
    return best;
  }

  // (r,c)를 현재 트레이의 어떤 조각으로든 덮을 수 있는가 — 과제 A 스폰 검증의 핵심 술어
  function canCoverCell(state, r, c) {
    for (var i = 0; i < state.tray.length; i++) {
      var s = state.tray[i];
      if (s == null) continue;
      var m = SHAPES[s].m;
      for (var dr = 0; dr < m.length; dr++)
        for (var dc = 0; dc < m[dr].length; dc++)

  function anyMoveExists(state) {
    for (var i = 0; i < state.tray.length; i++) {
      var s = state.tray[i];
      if (s == null) continue;
      for (var r = 0; r < N; r++)

          if (canPlace(state, s, r, c)) return true;
    }
    return false;
  }

  // 🔔 위기 지연 (판당 1회) — Ugly Support: grid defense 원리. 사용률 텔레메트리 감시 대상.
  function ringBell(state) {
    if (state.bellUsed || state.over || state.threats.length === 0) return false;
    state.threats.forEach(function (t) { t.countdown++; });
    state.bellUsed = true;
    return true;
  }

  function snapshot(state) {
    return JSON.stringify({ g: state.grid, cl: state.colors, s: state.score, t: state.tray, tc: state.trayColors, th: state.threats, p: state.placements });
  }

  function countCells(state, type) {
    var n = 0;
    for (var r = 0; r < N; r++) for (var c = 0; c < N; c++) if (state.grid[r][c] === type) n++;

  }

  return {
    N: N, EMPTY: EMPTY, BLOCK: BLOCK, JELLY: JELLY, HOLE: HOLE,
    BABY: BABY, CRUST: CRUST, SLIME: SLIME, NCOLORS: NCOLORS,
    BOMB: BOMB, ROCKET_H: ROCKET_H, ROCKET_V: ROCKET_V, MACARON: MACARON,
    SHAPES: SHAPES, SPAWN_EVERY: SPAWN_EVERY, COUNTDOWN: COUNTDOWN, STAGES: STAGES, DEFENSE_BABY: DEFENSE_BABY,
    difficulty: difficulty, previewPlace: previewPlace, discard: discard,
    newGame: newGame, canPlace: canPlace, place: place, anyMoveExists: anyMoveExists,
    ringBell: ringBell, shapeCells: shapeCells, threatAt: threatAt, snapshot: snapshot, countCells: countCells,
    canCoverCell: canCoverCell, applyGravity: applyGravity
  };
});

(function () {

    if (!firstPlaceDone) showHint();
    showOnce('bin', '안 쓰는 조각은 통에 버려요 — 대신 위협이 다가와요');
  }

  // ── 레이아웃 (가로·세로 모두 반영 — 작은 창/랩탑 호환) ──
  function resize() {
    var headerH = 92, trayH = Math.min(120, window.innerHeight * 0.18), chrome = 70;
    var availW = Math.min(window.innerWidth - 24, 416);
    var availH = window.innerHeight - headerH - trayH - chrome;
    var target = Math.max(Math.min(availW, availH), 224);
    CS = Math.max(24, Math.floor((target - PAD * 2) / C.N));
    var side = CS * C.N + PAD * 2;
    boardCv.style.width = side + 'px'; boardCv.style.height = side + 'px';
    boardCv.width = side * dpr; boardCv.height = side * dpr;
    bctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // ── 그리기 유틸 ──
  function rrect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function shade(hex, amt) {
    var n = parseInt(hex.slice(1), 16), r = (n >> 16) + amt, g = ((n >> 8) & 255) + amt, b = (n & 255) + amt;
    r = Math.max(0, Math.min(255, r)); g = Math.max(0, Math.min(255, g)); b = Math.max(0, Math.min(255, b));
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  // 귀여운 블록 셀 (얼굴 포함)
  function drawCuteCell(ctx, x, y, size, color, opts) {
    opts = opts || {};
    var s = size - GAP * 2, cx = x + size / 2, cy = y + size / 2;
    ctx.save();
    if (opts.scale && opts.scale !== 1) { ctx.translate(cx, cy); ctx.scale(opts.scale, opts.scale); ctx.translate(-cx, -cy); }
    // 몸통
    rrect(ctx, x + GAP, y + GAP, s, s, s * 0.3);
    ctx.fillStyle = color; ctx.fill();
    ctx.strokeStyle = shade(color, -40); ctx.lineWidth = 2; ctx.stroke();
    // 하이라이트
    rrect(ctx, x + GAP + s * 0.12, y + GAP + s * 0.08, s * 0.5, s * 0.22, s * 0.11);
    ctx.fillStyle = 'rgba(255,255,255,.45)'; ctx.fill();
    if (opts.face !== false && s >= 22) {
      var er = s * 0.07;
      ctx.fillStyle = '#4A2E17';
      ctx.beginPath(); ctx.arc(cx - s * 0.18, cy + s * 0.02, er, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.18, cy + s * 0.02, er, 0, 7); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,.9)';
      ctx.beginPath(); ctx.arc(cx - s * 0.18 + er * 0.35, cy + s * 0.02 - er * 0.35, er * 0.4, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.18 + er * 0.35, cy + s * 0.02 - er * 0.35, er * 0.4, 0, 7); ctx.fill();
      ctx.strokeStyle = '#4A2E17'; ctx.lineWidth = Math.max(1.5, s * 0.045); ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(cx, cy + s * 0.1, s * 0.13, 0.25 * Math.PI, 0.75 * Math.PI); ctx.stroke();
      ctx.fillStyle = 'rgba(255,120,150,.35)';
      ctx.beginPath(); ctx.arc(cx - s * 0.3, cy + s * 0.14, s * 0.08, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.3, cy + s * 0.14, s * 0.08, 0, 7); ctx.fill();
    }
    ctx.restore();
  }

  function drawJellyCell(ctx, x, y, size, t) {
    var s = size - GAP * 2, cx = x + size / 2, cy = y + size / 2;
    var wob = Math.sin(t / 260 + x * 0.05) * s * 0.03;
    ctx.save();
    rrect(ctx, x + GAP - wob / 2, y + GAP + wob, s + wob, s - wob, s * 0.38);
    ctx.fillStyle = JELLY_COLOR; ctx.globalAlpha = 0.92; ctx.fill();
    ctx.globalAlpha = 1; ctx.strokeStyle = shade(JELLY_COLOR, -40); ctx.lineWidth = 2; ctx.stroke();
    rrect(ctx, x + GAP + s * 0.14, y + GAP + s * 0.1 + wob, s * 0.45, s * 0.18, s * 0.09);
    ctx.fillStyle = 'rgba(255,255,255,.5)'; ctx.fill();
    // 젤리 얼굴 (동글 눈 + 벌린 입)
    if (s >= 22) {
      ctx.fillStyle = '#3D2350';
      ctx.beginPath(); ctx.arc(cx - s * 0.17, cy, s * 0.07, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.17, cy, s * 0.07, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy + s * 0.15, s * 0.09, 0, 7); ctx.fill();
    }
    ctx.restore();
  }

  // 폭탄 쿠키 (세션3) — 콤보 보상 아이템. 귀여운 오리지널 디자인(clean-room).
  function drawBombCell(ctx, x, y, size) {
    var s = size - GAP * 2, cx = x + size / 2, cy = y + size / 2 + s * 0.06, rr = s * 0.36;
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, rr, 0, 7); ctx.fillStyle = '#5B4A6B'; ctx.fill();
    ctx.strokeStyle = '#3D2F4A'; ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx - rr * 0.35, cy - rr * 0.35, rr * 0.3, 0, 7); ctx.fillStyle = 'rgba(255,255,255,.35)'; ctx.fill();
    ctx.strokeStyle = '#C9A227'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx + rr * 0.15, cy - rr * 0.95); ctx.quadraticCurveTo(cx + rr * 0.55, cy - rr * 1.35, cx + rr * 0.9, cy - rr * 1.15); ctx.stroke();
    ctx.fillStyle = '#FFB300'; ctx.beginPath(); ctx.arc(cx + rr * 0.95, cy - rr * 1.15, rr * 0.2, 0, 7); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(cx - rr * 0.3, cy - rr * 0.05, rr * 0.17, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + rr * 0.3, cy - rr * 0.05, rr * 0.17, 0, 7); ctx.fill();
    ctx.fillStyle = '#2A2135';
    ctx.beginPath(); ctx.arc(cx - rr * 0.27, cy - rr * 0.05, rr * 0.09, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + rr * 0.33, cy - rr * 0.05, rr * 0.09, 0, 7); ctx.fill();
    ctx.strokeStyle = '#2A2135'; ctx.lineWidth = Math.max(1.5, s * 0.04);
    ctx.beginPath(); ctx.arc(cx, cy + rr * 0.25, rr * 0.22, 0.2 * Math.PI, 0.8 * Math.PI); ctx.stroke();
    ctx.restore();
  }

  // 아기 쿠키 (세션4) — 지켜야 할 블록. 세션9: 사진 등록 시 소중한 것 사진으로 교체 (원형 클립 + 리본 유지)
  function drawBabyCell(ctx, x, y, size, t) {
    var s = size - GAP * 2, cx = x + size / 2, cy = y + size / 2;
    var bob = Math.sin(t / 320) * s * 0.03;
    var pimg = photoImgs.length ? photoImgs[runRescued % photoImgs.length] : null;
    if (pimg) {
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cy + bob, s * 0.42, 0, 7); ctx.clip();
      try { ctx.drawImage(pimg, cx - s * 0.42, cy - s * 0.42 + bob, s * 0.84, s * 0.84); } catch (e) {}
      ctx.restore();
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cy + bob, s * 0.42, 0, 7);
      ctx.strokeStyle = '#FF6E9C'; ctx.lineWidth = 3; ctx.stroke();
      // 리본 (지킬 대상 시각 언어 유지)
      ctx.fillStyle = '#FF6E9C';
      ctx.beginPath(); ctx.moveTo(cx, cy - s * 0.36 + bob); ctx.lineTo(cx - s * 0.16, cy - s * 0.5 + bob); ctx.lineTo(cx - s * 0.05, cy - s * 0.32 + bob); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx, cy - s * 0.36 + bob); ctx.lineTo(cx + s * 0.16, cy - s * 0.5 + bob); ctx.lineTo(cx + s * 0.05, cy - s * 0.32 + bob); ctx.closePath(); ctx.fill();
      ctx.restore();
      return;
    }
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy + bob, s * 0.4, 0, 7);
    ctx.fillStyle = BABY_COLOR; ctx.fill();
    ctx.strokeStyle = '#E0A85C'; ctx.lineWidth = 2; ctx.stroke();
    // 리본
    ctx.fillStyle = '#FF6E9C';
    ctx.beginPath(); ctx.moveTo(cx, cy - s * 0.34 + bob); ctx.lineTo(cx - s * 0.18, cy - s * 0.48 + bob); ctx.lineTo(cx - s * 0.06, cy - s * 0.3 + bob); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx, cy - s * 0.34 + bob); ctx.lineTo(cx + s * 0.18, cy - s * 0.48 + bob); ctx.lineTo(cx + s * 0.06, cy - s * 0.3 + bob); ctx.closePath(); ctx.fill();
    // 왕눈이 + 볼터치
    ctx.fillStyle = '#4A2E17';
    ctx.beginPath(); ctx.arc(cx - s * 0.14, cy + bob, s * 0.1, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + s * 0.14, cy + bob, s * 0.1, 0, 7); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx - s * 0.11, cy - s * 0.03 + bob, s * 0.045, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + s * 0.17, cy - s * 0.03 + bob, s * 0.045, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,110,150,.5)';
    ctx.beginPath(); ctx.arc(cx - s * 0.27, cy + s * 0.1 + bob, s * 0.07, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + s * 0.27, cy + s * 0.1 + bob, s * 0.07, 0, 7); ctx.fill();
    ctx.strokeStyle = '#4A2E17'; ctx.lineWidth = Math.max(1.5, s * 0.04); ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(cx, cy + s * 0.12 + bob, s * 0.08, 0.2 * Math.PI, 0.8 * Math.PI); ctx.stroke();
    ctx.restore();
  }

  // 굳은 설탕 (세션4) — 줄 완성 차단, 인접 클리어로 파괴
  function drawCrustCell(ctx, x, y, size) {
    var s = size - GAP * 2;
    ctx.save();
    rrect(ctx, x + GAP, y + GAP, s, s, s * 0.2);
    ctx.fillStyle = CRUST_COLOR; ctx.fill();
    ctx.strokeStyle = '#A8CDE0'; ctx.lineWidth = 2; ctx.stroke();
    // 결정 무늬
    ctx.strokeStyle = 'rgba(255,255,255,.9)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x + s * 0.5, y + s * 0.2); ctx.lineTo(x + s * 0.5, y + s * 0.8);
    ctx.moveTo(x + s * 0.24, y + s * 0.35); ctx.lineTo(x + s * 0.76, y + s * 0.65);
    ctx.moveTo(x + s * 0.76, y + s * 0.35); ctx.lineTo(x + s * 0.24, y + s * 0.65);
    ctx.stroke();
    ctx.restore();
  }

  // 초코 슬라임 (세션4) — 4배치마다 번짐. warn = 다음 배치에 번짐 임박
  function drawSlimeCell(ctx, x, y, size, t, warn) {
    var s = size - GAP * 2, cx = x + size / 2, cy = y + size / 2;
    var wob = Math.sin(t / 200 + x * 0.08) * s * 0.04;
    ctx.save();
    rrect(ctx, x + GAP - wob / 2, y + GAP + wob, s + wob, s - wob, s * 0.42);
    ctx.fillStyle = SLIME_COLOR; ctx.globalAlpha = 0.95; ctx.fill();
    ctx.globalAlpha = 1; ctx.strokeStyle = '#5A3820'; ctx.lineWidth = 2; ctx.stroke();
    rrect(ctx, x + GAP + s * 0.12, y + GAP + s * 0.1 + wob, s * 0.4, s * 0.16, s * 0.08);
    ctx.fillStyle = 'rgba(255,255,255,.3)'; ctx.fill();
    // 심술 눈
    if (s >= 22) {
      ctx.fillStyle = '#FFE9CE';
      ctx.beginPath(); ctx.arc(cx - s * 0.15, cy, s * 0.09, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.15, cy, s * 0.09, 0, 7); ctx.fill();
      ctx.fillStyle = '#3A2415';
      ctx.beginPath(); ctx.arc(cx - s * 0.13, cy + s * 0.02, s * 0.045, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.17, cy + s * 0.02, s * 0.045, 0, 7); ctx.fill();
    }
    if (warn) { // 번짐 임박 경고 (숨겨진 규칙 없음)
      var p2 = 0.5 + 0.5 * Math.sin(t / 110);
      rrect(ctx, x + GAP - 1, y + GAP - 1, s + 2, s + 2, s * 0.42);
      ctx.strokeStyle = 'rgba(122,78,45,' + (0.3 + p2 * 0.6) + ')'; ctx.lineWidth = 3; ctx.setLineDash([5, 4]); ctx.stroke(); ctx.setLineDash([]);
    }
    ctx.restore();
  }

  // 롤링핀 (세션4) — 가로/세로. 나무 밀대 모양
  function drawRocketCell(ctx, x, y, size, vertical) {
    var s = size - GAP * 2, cx = x + size / 2, cy = y + size / 2;
    ctx.save();
    ctx.translate(cx, cy);
    if (vertical) ctx.rotate(Math.PI / 2);
    // 몸통
    rrect(ctx, -s * 0.38, -s * 0.14, s * 0.76, s * 0.28, s * 0.14);
    ctx.fillStyle = '#D9A05B'; ctx.fill();
    ctx.strokeStyle = '#A9713A'; ctx.lineWidth = 2; ctx.stroke();
    // 손잡이
    rrect(ctx, -s * 0.52, -s * 0.07, s * 0.14, s * 0.14, s * 0.06);
    rrect(ctx, s * 0.38, -s * 0.07, s * 0.14, s * 0.14, s * 0.06);
    ctx.fillStyle = '#B5824A'; ctx.fill();
    // 진행 방향 반짝
    ctx.strokeStyle = 'rgba(255,255,255,.75)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-s * 0.25, -s * 0.04); ctx.lineTo(s * 0.2, -s * 0.04); ctx.stroke();
    ctx.restore();
  }

  // 색 마카롱 (세션4) — 인접 블록 색 전멸. 삼단 마카롱
  function drawMacaronCell(ctx, x, y, size, t) {
    var s = size - GAP * 2, cx = x + size / 2, cy = y + size / 2;
    var spin = (t || 0) / 600;
    ctx.save();
    for (var i = 0; i < 5; i++) { // 색상 링 (5색 = NCOLORS)
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.4, spin + i * Math.PI * 0.4, spin + (i + 1) * Math.PI * 0.4);
      ctx.strokeStyle = PIECE_COLORS[i]; ctx.lineWidth = s * 0.14; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(cx, cy, s * 0.24, 0, 7);
    ctx.fillStyle = '#FFF6E8'; ctx.fill();
    ctx.strokeStyle = '#E8CFA8'; ctx.lineWidth = 1.5; ctx.stroke();
    if (s >= 22) {
      ctx.fillStyle = '#4A2E17';
      ctx.beginPath(); ctx.arc(cx - s * 0.08, cy - s * 0.02, s * 0.04, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.08, cy - s * 0.02, s * 0.04, 0, 7); ctx.fill();
      ctx.strokeStyle = '#4A2E17'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(cx, cy + s * 0.05, s * 0.06, 0.25 * Math.PI, 0.75 * Math.PI); ctx.stroke();
    }
    ctx.restore();
  }

  // 특수 아이템 공용 드로어
  function drawSpecial(ctx, shapeIdx, x, y, size, t) {
    if (shapeIdx === C.BOMB) drawBombCell(ctx, x, y, size);
    else if (shapeIdx === C.ROCKET_H) drawRocketCell(ctx, x, y, size, false);
    else if (shapeIdx === C.ROCKET_V) drawRocketCell(ctx, x, y, size, true);
    else if (shapeIdx === C.MACARON) drawMacaronCell(ctx, x, y, size, t);
  }

  function drawHoleCell(ctx, x, y, size) {
    var s = size - GAP * 2;
    rrect(ctx, x + GAP, y + GAP, s, s, s * 0.25);
    ctx.fillStyle = HOLE_COLOR; ctx.fill();
    // 균열 무늬
    ctx.strokeStyle = 'rgba(0,0,0,.5)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x + s * 0.3, y + s * 0.25); ctx.lineTo(x + s * 0.55, y + s * 0.5); ctx.lineTo(x + s * 0.42, y + s * 0.75);
    ctx.moveTo(x + s * 0.55, y + s * 0.5); ctx.lineTo(x + s * 0.8, y + s * 0.62);
    ctx.stroke();
  }

  // 위협 예고 오버레이 (칸 위 — 상시 하이라이트 + 카운트다운 배지)
  // 세션3 가독성: "결과 미리보기" — 균열은 구멍이 되어가는 모습, 젤리는 차오르는 모습이 카운트다운에 비례해 진해짐
  function drawThreat(ctx, th, t) {
    var x = PAD + th.c * CS, y = PAD + th.r * CS, s = CS - GAP * 2;
    var prog = Math.max(0, Math.min(1, (C.COUNTDOWN - th.countdown) / C.COUNTDOWN)); // 0=여유 → 1=임박
    var pulse = 0.55 + 0.45 * Math.sin(t / (240 - prog * 150)); // 임박할수록 빠른 맥동
    var accent = th.type === 'crack' ? CRACK_ACCENT : th.type === 'crust' ? '#7FB8D4' : th.type === 'slime' ? SLIME_COLOR : th.type === 'crow' ? CROW_ACCENT : JELLY_ACCENT;
    ctx.save();
    if (th.type === 'crack') {
      // 구멍 프리뷰: 점점 어두워지고 균열이 자람
      rrect(ctx, x + GAP + s * 0.15, y + GAP + s * 0.15, s * 0.7, s * 0.7, s * 0.2);
      ctx.fillStyle = HOLE_COLOR; ctx.globalAlpha = 0.12 + prog * 0.5; ctx.fill();
      ctx.globalAlpha = Math.min(1, 0.3 + prog);
      ctx.strokeStyle = 'rgba(0,0,0,.55)'; ctx.lineWidth = 1.5 + prog * 1.5; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x + s * 0.35, y + s * 0.3); ctx.lineTo(x + s * 0.55, y + s * 0.5);
      if (prog > 0.3) { ctx.lineTo(x + s * 0.45, y + s * 0.72); ctx.moveTo(x + s * 0.55, y + s * 0.5); ctx.lineTo(x + s * 0.78, y + s * 0.6); }
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (th.type === 'crust') {
      // 내 블록 위에 서리가 덮여감 (결과 미리보기)
      rrect(ctx, x + GAP + 2, y + GAP + 2, s - 4, (s - 4) * (0.25 + prog * 0.75), s * 0.18);
      ctx.fillStyle = CRUST_COLOR; ctx.globalAlpha = 0.35 + prog * 0.45; ctx.fill();
      ctx.globalAlpha = 1;
    } else if (th.type === 'slime') {
      // 초코가 차오름
      var hgt2 = s * (0.2 + prog * 0.65);
      rrect(ctx, x + GAP + 2, y + GAP + (s - hgt2), s - 4, hgt2, Math.min(hgt2 * 0.4, s * 0.2));
      ctx.fillStyle = SLIME_COLOR; ctx.globalAlpha = 0.25 + prog * 0.45; ctx.fill();
      ctx.globalAlpha = 1;
    } else if (th.type === 'crow') {
      // 까마귀 그림자가 짙어짐 — 아기를 노림
      ctx.globalAlpha = 0.35 + prog * 0.55;
      var ccx = x + CS / 2, ccy = y + CS / 2;
      ctx.fillStyle = CROW_ACCENT;
      ctx.beginPath(); ctx.ellipse(ccx, ccy + s * 0.08, s * 0.24, s * 0.18, 0, 0, 7); ctx.fill(); // 몸통
      ctx.beginPath(); ctx.arc(ccx + s * 0.18, ccy - s * 0.08, s * 0.12, 0, 7); ctx.fill();      // 머리
      ctx.beginPath(); ctx.moveTo(ccx + s * 0.28, ccy - s * 0.1); ctx.lineTo(ccx + s * 0.42, ccy - s * 0.04); ctx.lineTo(ccx + s * 0.28, ccy - s * 0.01); ctx.closePath();
      ctx.fillStyle = '#FF9800'; ctx.fill(); // 부리
      ctx.fillStyle = CROW_ACCENT;
      ctx.beginPath(); ctx.moveTo(ccx - s * 0.1, ccy); ctx.quadraticCurveTo(ccx - s * 0.35, ccy - s * 0.28 - prog * s * 0.1, ccx - s * 0.42, ccy - s * 0.02); ctx.closePath(); ctx.fill(); // 날개
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(ccx + s * 0.2, ccy - s * 0.1, s * 0.035, 0, 7); ctx.fill(); // 눈
      ctx.globalAlpha = 1;
    } else {
      // 젤리 프리뷰: 바닥부터 차오름
      var hgt = s * (0.2 + prog * 0.65);
      rrect(ctx, x + GAP + 2, y + GAP + (s - hgt), s - 4, hgt, Math.min(hgt * 0.4, s * 0.2));
      ctx.fillStyle = JELLY_COLOR; ctx.globalAlpha = 0.22 + prog * 0.45; ctx.fill();
      ctx.globalAlpha = 1;
    }
    rrect(ctx, x + GAP + 1, y + GAP + 1, s - 2, s - 2, s * 0.28);
    ctx.strokeStyle = accent; ctx.globalAlpha = 0.35 + pulse * 0.55; ctx.lineWidth = 3;
    ctx.setLineDash([6, 5]); ctx.lineDashOffset = -t / 60; ctx.stroke(); ctx.setLineDash([]);
    ctx.globalAlpha = 0.12 + pulse * 0.1;
    ctx.fillStyle = accent; ctx.fill();
    ctx.globalAlpha = 1;
    // 아이콘 (텍스트 0 — 도형으로): 균열 = 지그재그, 젤리·슬라임 = 물방울, 설탕 = 눈결정, 까마귀 = 자체 실루엣
    ctx.strokeStyle = accent; ctx.fillStyle = accent; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    var cx = x + CS / 2, cy = y + CS / 2;
    if (th.type === 'crack') {
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.22, cy - s * 0.2); ctx.lineTo(cx, cy - s * 0.02); ctx.lineTo(cx - s * 0.1, cy + s * 0.12); ctx.lineTo(cx + s * 0.16, cy + s * 0.24);

      ctx.beginPath();
      for (var ic = 0; ic < 3; ic++) {

      ctx.bezierCurveTo(cx - s * 0.14, cy + s * 0.22, cx - s * 0.22, cy + s * 0.05, cx, cy - s * 0.2);

  // ── 보드 그리기 ──
  function drawBoard(t) {
    var side = CS * C.N + PAD * 2;
    bctx.clearRect(0, 0, side, side);
    if (shakeT > 0) { bctx.save(); bctx.translate((Math.sin(t / 18) * 4) * (shakeT / 300), (Math.cos(t / 23) * 3) * (shakeT / 300)); shakeT -= 16; }
    else bctx.save();
    // 패널
    rrect(bctx, 0, 0, side, side, 22); bctx.fillStyle = BOARD_BG; bctx.fill();
    // 셀 바닥
    for (var r = 0; r < C.N; r++) for (var c = 0; c < C.N; c++) {
      var x = PAD + c * CS, y = PAD + r * CS;
      rrect(bctx, x + GAP, y + GAP, CS - GAP * 2, CS - GAP * 2, (CS - GAP * 2) * 0.22);
      bctx.fillStyle = ((r + c) % 2 === 0) ? CELL_INNER : shade(CELL_INNER, -12);
      bctx.fill();
    }
    // 내용물
    for (var r2 = 0; r2 < C.N; r2++) for (var c2 = 0; c2 < C.N; c2++) {
      var v = state.grid[r2][c2], x2 = PAD + c2 * CS, y2 = PAD + r2 * CS;
      var key = r2 + ',' + c2, scale = 1;
      if (cellPop[key]) {
        var dt = t - cellPop[key];
        if (dt > 320) delete cellPop[key];
        else { var p = dt / 320; scale = 1 + 0.25 * Math.sin(p * Math.PI) * (1 - p); }
      }
      // 낙하 애니메이션 (과제 B) — 그리드는 이미 최종 상태, 그리는 위치만 출발 행→도착 행 보간(가속 이징)
      var fa = fallAnim[key];
      if (fa && (v === C.BLOCK || v === C.JELLY)) {
        var dtf = t - fa.t0;
        if (dtf >= fa.dur) { delete fallAnim[key]; cellPop[key] = t; }
        else if (dtf < 0) y2 = PAD + fa.fromR * CS;
        else { var pf = (dtf / fa.dur); pf = pf * pf; y2 = PAD + (fa.fromR + (r2 - fa.fromR) * pf) * CS; }
      }
      if (v === C.BLOCK) drawCuteCell(bctx, x2, y2, CS, cellColor(r2, c2), { scale: scale });
      else if (v === C.JELLY) drawJellyCell(bctx, x2, y2, CS, t);
      else if (v === C.HOLE) drawHoleCell(bctx, x2, y2, CS);
      else if (v === C.BABY) drawBabyCell(bctx, x2, y2, CS, t);
      else if (v === C.CRUST) drawCrustCell(bctx, x2, y2, CS);
      else if (v === C.SLIME) drawSlimeCell(bctx, x2, y2, CS, t, state.placements % 4 === 3); // 다음 배치에 번짐 → 경고 맥동 (Pillar 1)
    }
    // 위협 예고
    for (var i = 0; i < state.threats.length; i++) drawThreat(bctx, state.threats[i], t);
    // 드래그 고스트 (배치 미리보기)
    if (drag && drag.target) {
      var tg = drag.target, valid = tg.valid;
      var cells = C.shapeCells(drag.shapeIdx, tg.r, tg.c);
      for (var k = 0; k < cells.length; k++) {
        var rr = cells[k][0], cc = cells[k][1];
        if (rr < 0 || cc < 0 || rr >= C.N || cc >= C.N) continue;
        var gx = PAD + cc * CS, gy = PAD + rr * CS;
        rrect(bctx, gx + GAP, gy + GAP, CS - GAP * 2, CS - GAP * 2, (CS - GAP * 2) * 0.3);
        bctx.fillStyle = valid ? 'rgba(120,220,140,.5)' : 'rgba(240,90,90,.45)';
        bctx.fill();
      }
      // 결과 미리보기 (세션3 — 완전 정보): 클리어될 줄·낙하 도착지·해체·폭발 범위를 배치 전에 표시
      if (valid) {
        var pvKey = tg.r + ',' + tg.c;
        if (drag.pvKey !== pvKey) { drag.pvKey = pvKey; drag.pv = C.previewPlace(state, drag.shapeIdx, tg.r, tg.c, state.trayColors[drag.slot]); }
        var pv = drag.pv;
        if (pv) {
          var glow = 0.35 + 0.25 * Math.sin(t / 140);
          // 파괴 예정 칸 통합 (줄 클리어 + 아이템 파괴 + 인접 파괴)
          var toClear = pv.clearedCells
            .concat(pv.bomb ? pv.bomb.cleared : [])
            .concat(pv.rocket ? pv.rocket.cleared : [])
            .concat(pv.macaron ? pv.macaron.cleared : [])
            .concat(pv.broke || []);
          toClear.forEach(function (p) {
            var px = PAD + p[1] * CS, py = PAD + p[0] * CS;
            rrect(bctx, px + GAP, py + GAP, CS - GAP * 2, CS - GAP * 2, (CS - GAP * 2) * 0.25);
            bctx.fillStyle = 'rgba(255,235,130,' + glow + ')'; bctx.fill();
          });
          // 아기 위험 경고 (완전 정보): 이 수를 두면 까마귀가 아기를 채감
          if (pv.babyEaten) {
            for (var wr = 0; wr < C.N; wr++) for (var wc = 0; wc < C.N; wc++) {
              if (state.grid[wr][wc] !== C.BABY) continue;
              var wx = PAD + wc * CS, wy = PAD + wr * CS, ws = CS - GAP * 2;
              rrect(bctx, wx + GAP - 2, wy + GAP - 2, ws + 4, ws + 4, ws * 0.3);
              bctx.strokeStyle = 'rgba(230,50,50,' + (glow + 0.35) + ')'; bctx.lineWidth = 4; bctx.stroke();
            }
          }
          // 구출 예고: 이 수로 아기가 구출됨
          if (pv.rescued > 0) {
            for (var gr = 0; gr < C.N; gr++) for (var gc = 0; gc < C.N; gc++) {
              if (state.grid[gr][gc] !== C.BABY) continue;
              var gx2 = PAD + gc * CS, gy2 = PAD + gr * CS, gs = CS - GAP * 2;
              rrect(bctx, gx2 + GAP - 2, gy2 + GAP - 2, gs + 4, gs + 4, gs * 0.3);
              bctx.strokeStyle = 'rgba(255,110,156,' + (glow + 0.35) + ')'; bctx.lineWidth = 4; bctx.stroke();
            }
          }
          pv.fell.forEach(function (mv) {
            var px = PAD + mv[3] * CS, py = PAD + mv[2] * CS, ss = CS - GAP * 2;

            bctx.strokeStyle = 'rgba(90,160,255,.9)'; bctx.lineWidth = 2.5; bctx.lineCap = 'round';
            bctx.beginPath(); // ▼ 낙하 표시

            bctx.stroke();

            var px = PAD + p[1] * CS, py = PAD + p[0] * CS, ss = CS - GAP * 2;
            rrect(bctx, px + GAP, py + GAP, ss, ss, ss * 0.25);
            bctx.strokeStyle = 'rgba(255,200,40,' + (glow + 0.3) + ')'; bctx.lineWidth = 3; bctx.stroke();
          });
          if (pv.bomb) {
            var bx = PAD + (tg.c - 1) * CS, by = PAD + (tg.r - 1) * CS;
            rrect(bctx, Math.max(PAD, bx) + 2, Math.max(PAD, by) + 2,
              Math.min(CS * 3, PAD + C.N * CS - Math.max(PAD, bx)) - 4, Math.min(CS * 3, PAD + C.N * CS - Math.max(PAD, by)) - 4, 10);
            bctx.strokeStyle = 'rgba(255,110,60,' + (glow + 0.25) + ')'; bctx.lineWidth = 3; bctx.setLineDash([7, 5]); bctx.stroke(); bctx.setLineDash([]);
          }
        }

    }

    if (vignetteT > 0) {
      vignetteT -= 16;
      var va = Math.min(0.55, vignetteT / 700);
      bctx.strokeStyle = 'rgba(224,52,52,' + va + ')';
      bctx.lineWidth = 12;
      rrect(bctx, 5, 5, side - 10, side - 10, 20);
      bctx.stroke();
    }
    // FX
    drawFx(t);
    bctx.restore();
  }

  // ── 로컬 저장 (세션7) — 베스트 스코어·뮤트 설정. file:// 환경 예외 대비 guard.
  function storeGet(k) { try { return window.localStorage ? localStorage.getItem(k) : null; } catch (e) { return null; } }
  function storeSet(k, v) { try { if (window.localStorage) localStorage.setItem(k, v); } catch (e) {} }

  // ── 사운드 (세션3·7) — WebAudio 합성음, 에셋 0개(단일 파일 유지). 마스터 게인 + 뮤트 토글(설정 기억).
  var AC = window.AudioContext || window.webkitAudioContext;
  var actx = null, masterG = null;
  var muted = storeGet('cp-mute') === '1';
  function ensureAudio() {
    if (AC && !actx) {
      try {
        actx = new AC();
        masterG = actx.createGain();
        masterG.gain.value = muted ? 0 : 1;
        masterG.connect(actx.destination);

  // kind별 프리셋. delaySec: 연쇄 시차와 동기화
  function sfx(kind, n, delaySec) {
    var d = delaySec || 0;
    if (kind === 'place') { tone(300, 0.07, 'sine', 0.1, d, 220); }
    else if (kind === 'clear') { tone(523, 0.1, 'triangle', 0.14, d); tone(659, 0.1, 'triangle', 0.12, d + 0.06); tone(784, 0.14, 'triangle', 0.11, d + 0.12); }
    else if (kind === 'combo') { var b = 523 * Math.pow(1.22, Math.min(n || 2, 7)); tone(b, 0.09, 'triangle', 0.16, d); tone(b * 1.25, 0.13, 'triangle', 0.13, d + 0.07); }
    else if (kind === 'defuse') { tone(880, 0.08, 'sine', 0.12, d); tone(1318, 0.11, 'sine', 0.09, d + 0.05); }
    else if (kind === 'spawn') { tone(185, 0.14, 'square', 0.06, d, 140); }
    else if (kind === 'fire') { tone(120, 0.22, 'sawtooth', 0.13, d, 55); }
    else if (kind === 'bell') { tone(1046, 0.28, 'triangle', 0.13, d); tone(1568, 0.36, 'sine', 0.07, d + 0.02); }
    else if (kind === 'bomb') { tone(90, 0.32, 'sawtooth', 0.2, d, 40); tone(55, 0.28, 'square', 0.14, d + 0.03, 30); }
    else if (kind === 'grant') { tone(659, 0.09, 'square', 0.09, d); tone(880, 0.13, 'square', 0.08, d + 0.06); }
    else if (kind === 'over') { tone(392, 0.16, 'triangle', 0.13, d); tone(311, 0.16, 'triangle', 0.12, d + 0.15); tone(233, 0.28, 'triangle', 0.11, d + 0.3); }
    else if (kind === 'rocket') { tone(200, 0.24, 'sawtooth', 0.13, d, 900); }
    else if (kind === 'macaron') { tone(523, 0.07, 'sine', 0.12, d); tone(659, 0.07, 'sine', 0.11, d + 0.05); tone(784, 0.07, 'sine', 0.1, d + 0.1); tone(1046, 0.12, 'sine', 0.1, d + 0.15); }
    else if (kind === 'rescue') { tone(523, 0.1, 'triangle', 0.15, d); tone(659, 0.1, 'triangle', 0.14, d + 0.09); tone(784, 0.1, 'triangle', 0.13, d + 0.18); tone(1046, 0.22, 'triangle', 0.14, d + 0.27); }
    else if (kind === 'caw') { tone(240, 0.09, 'square', 0.12, d, 180); tone(220, 0.11, 'square', 0.1, d + 0.11, 160); }
    else if (kind === 'crackle') { tone(1400, 0.05, 'square', 0.07, d); tone(900, 0.05, 'square', 0.07, d + 0.04); tone(1100, 0.06, 'square', 0.06, d + 0.09); }
    else if (kind === 'blub') { tone(160, 0.12, 'sine', 0.12, d, 90); }
    else if (kind === 'discard') { tone(420, 0.14, 'sine', 0.1, d, 160); tone(140, 0.1, 'square', 0.06, d + 0.1); }
